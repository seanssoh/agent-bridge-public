# agent-bridge:managed permissions=bridge-roles
# Managed by agent-bridge. Regenerated by agent-bridge on scaffold/upgrade.
# Edits inside the managed block are replaced; keep your own profiles in a
# SEPARATE file or outside the managed markers below.
#
# These are Codex named permission profiles for Agent Bridge roles. Select one
# at session start with `-p bridge-<role>` (or `--permission bridge-<role>`),
# e.g. `codex -p bridge-worker`. The profile id is the table name suffix.
#
# Schema (Codex named permission profiles, config.toml):
#   [permissions.<id>]            — defines a profile
#     extends      = "<id>"       — inherit from another profile (optional)
#     sandbox_mode = "read-only" | "workspace-write" | "danger-full-access"
#     workspace_roots = [ ... ]   — extra writable roots beyond cwd
#   [permissions.<id>.network]
#     enabled = true|false
#   [permissions.<id>.network.domains]
#     "<host-or-*.glob>" = "allow" | "deny"
#
# The roots below use the literal token "<agent-home>" — the agent-bridge
# scaffolder substitutes the resolved agent home path at install time. Leaving
# it unsubstituted is harmless (Codex treats it as a non-existent path).

# === BEGIN agent-bridge:managed permission profiles ===

# bridge-reviewer — least privilege. Read-only sandbox: inspect diffs, read the
# repo and the agent home, run read-only `agb` queries. No file writes, no
# network. Use for code/queue review sessions.
[permissions.bridge-reviewer]
sandbox_mode = "read-only"
workspace_roots = []

[permissions.bridge-reviewer.network]
enabled = false

# bridge-worker — default fixer/worker. Workspace-write sandbox: edit files in
# the current workspace and the agent home, run `agb` queue commands. Network
# is scoped to the hosts a worker actually needs (git host + package mirror);
# everything else stays denied so a worker cannot exfiltrate or reach arbitrary
# endpoints. Extend the domain allowlist per install, do not switch to `*`.
[permissions.bridge-worker]
sandbox_mode = "workspace-write"
workspace_roots = ["<agent-home>"]

[permissions.bridge-worker.network]
enabled = true

[permissions.bridge-worker.network.domains]
"github.com" = "allow"
"*.github.com" = "allow"
"localhost" = "allow"
"127.0.0.1" = "allow"

# bridge-admin — highest trust, for the admin/orchestrator agent only. Inherits
# the worker profile and widens it: writable agent home plus the bridge runtime
# root so the admin can manage roster/state through the supported `agb` paths.
# Still NOT danger-full-access — admin work goes through bridge CLI verbs, not a
# blanket host write. Network keeps the worker allowlist (override per install).
[permissions.bridge-admin]
extends = "bridge-worker"
sandbox_mode = "workspace-write"
workspace_roots = ["<agent-home>", "<bridge-home>"]

# === END agent-bridge:managed permission profiles ===
