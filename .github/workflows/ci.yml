name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_legacy_full:
        description: "Run archived legacy full smoke monolith"
        required: false
        default: false
        type: boolean
  schedule:
    # Nightly KST morning run for long and environment-sensitive smoke.
    - cron: "0 19 * * *"

permissions:
  contents: read

env:
  BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
  HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  syntax:
    name: syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify shell syntax
        run: |
          set -euo pipefail
          git ls-files -z '*.sh' 'agent-bridge' 'agb' \
            | xargs -0 -n 1 bash -n

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          shellcheck --severity=warning \
            *.sh \
            agent-bridge \
            agb \
            lib/*.sh \
            scripts/*.sh \
            scripts/smoke/*.sh \
            agent-roster.local.example.sh

  oss-preflight:
    name: oss-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ripgrep
        # scripts/oss-preflight.sh scans tracked files for secret/email
        # leakage via `rg`. The default ubuntu-latest image ships without
        # ripgrep, so the preflight bash_die'd with `rg: command not found`
        # on every PR. Same package is needed by scripts/iso-helper-ratchet.sh
        # when invoked manually; keep the install scoped to this job since
        # ratchet is not currently wired into CI (codex r2 fixer follow-up).
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run OSS preflight
        run: bash ./scripts/oss-preflight.sh

  lint-heredoc-ban:
    name: lint-heredoc-ban
    # Phase 1 baseline ratchet for footgun #11
    # (Bash 5.3.9 read_comsub/heredoc_write deadlock).
    # See docs/developer-handover.md §5.7 and
    # scripts/lint-heredoc-ban.sh --baseline-check for the policy.
    runs-on: ubuntu-latest
    # 10m (not 5m): the scan itself is seconds, but a 5m wall was being hit
    # (job killed at exactly 5m04s = `cancelled`) on congested ubuntu-latest
    # runners during release waves, eating reruns on PRs whose diff has zero
    # heredoc regression. 10m gives headroom without masking a real hang.
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run scanner self-test (legacy per-file ceiling fixtures)
        run: bash ./scripts/lint-heredoc-ban.sh --self-test

      - name: Run scanner self-test (taxonomic — audit classifier)
        # Exercises scripts/audit-footgun-11.sh against a checked-in
        # fixture covering the full C1/C2/C3/C4/H3/SAFE matrix +
        # snippet_hash reformatting invariance + JSON validity. Without
        # this, a regression in the classifier would silently disappear
        # rows from --baseline-check (which only flags NEW sites; vanished
        # rows are not failures) and the ratchet would pass while the
        # tooling rotted (r2 fix for codex PR #954 r1 finding P2 #2).
        run: bash ./scripts/smoke/lint-heredoc-scanner-self.sh

      - name: Verify baseline ratchet (fails on new heredoc-stdin sites)
        run: bash ./scripts/lint-heredoc-ban.sh --baseline-check

  unit-static-smoke-shard:
    # Matrix children of the required unit/static smoke battery. #1897: the
    # battery crossed its ~25m wall-clock cap and intermittently false-red'd
    # (all smokes passing at the kill point). Policy (#1509) is "split the
    # suite, do NOT bump again" — so the required selected list is sharded
    # across a 3-way matrix instead. Each shard recomputes its OWN selected
    # list and its OWN needs_bun decision FROM THE SHARDED LIST, then runs only
    # its shard via ci-select-smoke.sh --shard-index N --shard-total 3.
    #
    # Per-shard check names are `unit/static smoke shard N/3` — DISTINCT from
    # the branch-protection gate name. The exact `unit/static smoke` check is
    # preserved by the separate aggregate job below; the matrix children must
    # NOT carry that name (duplicate/ambiguous check-run names are the failure
    # mode #1897 calls out).
    name: unit/static smoke shard ${{ matrix.shard }}/3
    runs-on: ubuntu-latest
    # 25m PER SHARD (unchanged): each shard lands ~8-12m, so the 25m cap stays
    # purely as a hang detector — not a routine ceiling. Do not bump; if a
    # single shard legitimately approaches 25m, raise K (the shard total)
    # instead. See #1509 / #1897.
    timeout-minutes: 25
    needs:
      - syntax
      - lint
      - oss-preflight
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show selected required smoke (shard ${{ matrix.shard }}/3)
        id: required-smoke
        run: |
          set -euo pipefail
          selected="$(bash ./scripts/ci-select-smoke.sh --suite required --base "$BASE_SHA" --head "$HEAD_SHA" --shard-index ${{ matrix.shard }} --shard-total 3)"
          printf '%s\n' "$selected"
          if grep -Eqx 'scripts/smoke/(telegram-relay-plugin|mattermost-plugin)\.sh' <<<"$selected"; then
            echo "needs_bun=true" >>"$GITHUB_OUTPUT"
          else
            echo "needs_bun=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Install bun
        if: steps.required-smoke.outputs.needs_bun == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run selected required smoke (shard ${{ matrix.shard }}/3)
        run: bash ./scripts/ci-select-smoke.sh --suite required --base "$BASE_SHA" --head "$HEAD_SHA" --run --shard-index ${{ matrix.shard }} --shard-total 3

  unit-static-smoke:
    # Aggregate gate — preserves the EXACT `unit/static smoke` check name that
    # branch protection requires (#1897). It only evaluates the matrix result;
    # it has no heavy steps. It fails if any shard failed/cancelled/timed out.
    #
    # Pass: the matrix job result is `success`. We also pass on `skipped` ONLY
    # to preserve current semantics — when the prerequisite jobs (syntax/lint/
    # oss-preflight) skip, the smoke matrix is skipped too and the gate must
    # not invent a failure. A shard that ACTUALLY runs and fails yields a
    # matrix result of `failure`/`cancelled`, which fails the gate.
    name: unit/static smoke
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - unit-static-smoke-shard
    if: ${{ always() }}
    steps:
      - name: Aggregate shard results
        run: |
          set -euo pipefail
          result='${{ needs.unit-static-smoke-shard.result }}'
          echo "unit/static smoke matrix result: $result"
          case "$result" in
            success|skipped)
              echo "All required unit/static smoke shards passed (or were skipped with their prerequisites)."
              ;;
            *)
              echo "::error::unit/static smoke failed: one or more shards reported '$result'." >&2
              exit 1
              ;;
          esac

  integration-smoke:
    name: integration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - syntax
      - lint
      - oss-preflight
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show selected integration smoke
        run: bash ./scripts/ci-select-smoke.sh --suite integration --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Run selected integration smoke
        run: bash ./scripts/ci-select-smoke.sh --suite integration --base "$BASE_SHA" --head "$HEAD_SHA" --run

  live-tmux-daemon-smoke:
    name: live/tmux/daemon smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - syntax
      - lint
      - oss-preflight
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push'
    continue-on-error: ${{ github.event_name != 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install live smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Show selected live smoke
        run: bash ./scripts/ci-select-smoke.sh --suite live --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Run selected live smoke
        run: bash ./scripts/ci-select-smoke.sh --suite live --base "$BASE_SHA" --head "$HEAD_SHA" --run

  legacy-full-smoke:
    name: legacy-full-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - syntax
      - lint
      - oss-preflight
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_legacy_full == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install legacy smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux shellcheck

      - name: Run legacy full smoke
        run: |
          echo "legacy-full-smoke is archived and opt-in only; modular smoke jobs are the deploy/PR signal."
          timeout 12m bash ./scripts/smoke/legacy-full-smoke.sh
