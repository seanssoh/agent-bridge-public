name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_legacy_full:
        description: "Run archived legacy full smoke monolith"
        required: false
        default: false
        type: boolean
  schedule:
    # Nightly KST morning run for long and environment-sensitive smoke.
    - cron: "0 19 * * *"

permissions:
  contents: read

env:
  BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
  HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  syntax:
    name: syntax
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify shell syntax
        run: |
          set -euo pipefail
          git ls-files -z '*.sh' 'agent-bridge' 'agb' \
            | xargs -0 -n 1 bash -n

  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run shellcheck
        run: |
          set -euo pipefail
          shellcheck --severity=warning \
            *.sh \
            agent-bridge \
            agb \
            lib/*.sh \
            scripts/*.sh \
            scripts/smoke/*.sh \
            agent-roster.local.example.sh

  oss-preflight:
    name: oss-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ripgrep
        # scripts/oss-preflight.sh scans tracked files for secret/email
        # leakage via `rg`. The default ubuntu-latest image ships without
        # ripgrep, so the preflight bash_die'd with `rg: command not found`
        # on every PR. Same package is needed by scripts/iso-helper-ratchet.sh
        # when invoked manually; keep the install scoped to this job since
        # ratchet is not currently wired into CI (codex r2 fixer follow-up).
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Run OSS preflight
        run: bash ./scripts/oss-preflight.sh

  lint-heredoc-ban:
    name: lint-heredoc-ban
    # Phase 1 baseline ratchet for footgun #11
    # (Bash 5.3.9 read_comsub/heredoc_write deadlock).
    # See docs/developer-handover.md §5.7 and
    # scripts/lint-heredoc-ban.sh --baseline-check for the policy.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run scanner self-test (legacy per-file ceiling fixtures)
        run: bash ./scripts/lint-heredoc-ban.sh --self-test

      - name: Run scanner self-test (taxonomic — audit classifier)
        # Exercises scripts/audit-footgun-11.sh against a checked-in
        # fixture covering the full C1/C2/C3/C4/H3/SAFE matrix +
        # snippet_hash reformatting invariance + JSON validity. Without
        # this, a regression in the classifier would silently disappear
        # rows from --baseline-check (which only flags NEW sites; vanished
        # rows are not failures) and the ratchet would pass while the
        # tooling rotted (r2 fix for codex PR #954 r1 finding P2 #2).
        run: bash ./scripts/smoke/lint-heredoc-scanner-self.sh

      - name: Verify baseline ratchet (fails on new heredoc-stdin sites)
        run: bash ./scripts/lint-heredoc-ban.sh --baseline-check

  unit-static-smoke:
    name: unit/static smoke
    runs-on: ubuntu-latest
    # 15m (not 10m): the required-smoke suite legitimately runs ~9m30s-10m on
    # ubuntu-latest, so a 10m cap intermittently CANCELLED the job on normal
    # runner variance (+20s tips it over) — surfacing as the recurring
    # "unit/static smoke" false-red mislabeled as the #1509 kappa flake. The
    # hermetic-snapshot fix in this PR closes a real source-mutation race but
    # is secondary; the tight timeout was the dominant cause. 15m matches the
    # integration-smoke budget below. See #1509.
    timeout-minutes: 15
    needs:
      - syntax
      - lint
      - oss-preflight
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show selected required smoke
        id: required-smoke
        run: |
          set -euo pipefail
          selected="$(bash ./scripts/ci-select-smoke.sh --suite required --base "$BASE_SHA" --head "$HEAD_SHA")"
          printf '%s\n' "$selected"
          if grep -Eqx 'scripts/smoke/(telegram-relay-plugin|mattermost-plugin)\.sh' <<<"$selected"; then
            echo "needs_bun=true" >>"$GITHUB_OUTPUT"
          else
            echo "needs_bun=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Install bun
        if: steps.required-smoke.outputs.needs_bun == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Run selected required smoke
        run: bash ./scripts/ci-select-smoke.sh --suite required --base "$BASE_SHA" --head "$HEAD_SHA" --run

  integration-smoke:
    name: integration smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - syntax
      - lint
      - oss-preflight
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show selected integration smoke
        run: bash ./scripts/ci-select-smoke.sh --suite integration --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Run selected integration smoke
        run: bash ./scripts/ci-select-smoke.sh --suite integration --base "$BASE_SHA" --head "$HEAD_SHA" --run

  live-tmux-daemon-smoke:
    name: live/tmux/daemon smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - syntax
      - lint
      - oss-preflight
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || github.event_name == 'push'
    continue-on-error: ${{ github.event_name != 'schedule' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install live smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Show selected live smoke
        run: bash ./scripts/ci-select-smoke.sh --suite live --base "$BASE_SHA" --head "$HEAD_SHA"

      - name: Run selected live smoke
        run: bash ./scripts/ci-select-smoke.sh --suite live --base "$BASE_SHA" --head "$HEAD_SHA" --run

  legacy-full-smoke:
    name: legacy-full-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - syntax
      - lint
      - oss-preflight
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_legacy_full == true }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install legacy smoke dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux shellcheck

      - name: Run legacy full smoke
        run: |
          echo "legacy-full-smoke is archived and opt-in only; modular smoke jobs are the deploy/PR signal."
          timeout 12m bash ./scripts/smoke/legacy-full-smoke.sh
